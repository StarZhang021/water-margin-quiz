<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水浒人物性格测评 — 测测你是梁山哪位好汉？</title>
<meta name="description" content="基于《水浒传》一百单八将性格特质的趣味测评，24题精简版与96题完整版，匹配你最接近的梁山好汉。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+XiaoWei&display=swap');

:root {
  --bg-deep: #0d0a07;
  --bg-primary: #1a1410;
  --bg-secondary: #231c14;
  --bg-card: #2e2419;
  --bg-card-hover: #3a2e22;
  --accent-red: #c23a2b;
  --accent-red-glow: rgba(194,58,43,0.4);
  --accent-red-soft: rgba(194,58,43,0.15);
  --accent-gold: #d4a84b;
  --accent-gold-dim: rgba(212,168,75,0.25);
  --accent-jade: #5a8a6e;
  --accent-jade-dim: rgba(90,138,110,0.2);
  --text-primary: #e8dcc8;
  --text-secondary: #a89880;
  --text-muted: #6b5d4f;
  --border-subtle: rgba(168,152,128,0.1);
  --font-brush: "Ma Shan Zheng", "ZCOOL XiaoWei", cursive;
  --font-serif: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", serif;
  --font-sans: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --ease-out: cubic-bezier(0.25,0.46,0.45,0.94);
  --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;line-height:1.7;-webkit-font-smoothing:antialiased}

/* ===== BACKGROUND CANVAS ===== */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ===== NOISE OVERLAY ===== */
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ===== APP CONTAINER ===== */
#app{position:relative;z-index:2;min-height:100vh}

/* ===== PAGE SYSTEM ===== */
.page{display:none;min-height:100vh;padding:2rem 1.5rem;animation:fadeSlideIn 0.6s var(--ease-out) both}
.page.active{display:flex;flex-direction:column;align-items:center}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== WELCOME PAGE ===== */
.welcome{justify-content:center;text-align:center;max-width:680px;margin:0 auto}
.welcome-ornament{font-size:3rem;margin-bottom:1rem;opacity:0;animation:floatIn 1s 0.2s var(--ease-bounce) both}
@keyframes floatIn{from{opacity:0;transform:scale(0.5) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

.welcome-title{font-family:var(--font-brush);font-size:clamp(2.5rem,8vw,4.5rem);background:linear-gradient(135deg,var(--text-primary),var(--accent-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.08em;line-height:1.3;margin-bottom:0.5rem;opacity:0;animation:fadeSlideIn 0.8s 0.4s var(--ease-out) both}
.welcome-sub{font-family:var(--font-serif);font-size:clamp(1rem,3vw,1.3rem);color:var(--accent-gold);letter-spacing:0.15em;margin-bottom:2rem;opacity:0;animation:fadeSlideIn 0.8s 0.6s var(--ease-out) both}
.welcome-desc{font-size:0.95rem;color:var(--text-secondary);max-width:480px;margin:0 auto 2.5rem;line-height:1.9;opacity:0;animation:fadeSlideIn 0.8s 0.8s var(--ease-out) both}

/* Version selector */
.version-selector{display:flex;gap:1rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap;opacity:0;animation:fadeSlideIn 0.8s 1s var(--ease-out) both}
.version-card{background:var(--bg-card);border:2px solid var(--border-subtle);border-radius:16px;padding:1.5rem 2rem;cursor:pointer;transition:all 0.3s var(--ease-out);width:200px;text-align:center;position:relative;overflow:hidden}
.version-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-red-soft),transparent);opacity:0;transition:opacity 0.3s}
.version-card:hover{border-color:var(--accent-red);transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.version-card:hover::before{opacity:1}
.version-card.selected{border-color:var(--accent-red);box-shadow:0 0 20px var(--accent-red-glow)}
.version-card.selected::before{opacity:1}
.version-icon{font-size:2rem;margin-bottom:0.5rem;position:relative;z-index:1}
.version-name{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:0.3rem;position:relative;z-index:1}
.version-info{font-size:0.8rem;color:var(--text-secondary);position:relative;z-index:1}
.version-badge{position:absolute;top:8px;right:8px;background:var(--accent-red);color:white;font-size:0.65rem;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:0.05em}

.btn-start{font-family:var(--font-serif);font-size:1.2rem;font-weight:700;color:var(--text-primary);background:linear-gradient(135deg,var(--accent-red),#a02820);border:none;padding:1rem 3rem;border-radius:12px;cursor:pointer;letter-spacing:0.15em;transition:all 0.3s var(--ease-out);position:relative;overflow:hidden;opacity:0;animation:fadeSlideIn 0.8s 1.2s var(--ease-out) both}
.btn-start::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,0.15);border-radius:50%;transform:translate(-50%,-50%);transition:width 0.5s,height 0.5s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 25px var(--accent-red-glow)}
.btn-start:hover::before{width:300px;height:300px}
.btn-start:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

.welcome-footer{margin-top:2rem;font-size:0.8rem;color:var(--text-muted);opacity:0;animation:fadeSlideIn 0.8s 1.4s var(--ease-out) both}

/* ===== QUIZ PAGE ===== */
.quiz{max-width:700px;width:100%;margin:0 auto;padding-top:1rem}

/* Progress bar - bamboo style */
.progress-bar{margin-bottom:2rem}
.progress-track{width:100%;height:12px;background:var(--bg-card);border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--border-subtle)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-red),var(--accent-gold));border-radius:6px;transition:width 0.5s var(--ease-out);position:relative}
.progress-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3));border-radius:0 6px 6px 0}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem}
.progress-text{font-family:var(--font-serif);font-size:0.85rem;color:var(--text-secondary)}
.progress-dim{font-size:0.8rem;color:var(--accent-jade);font-weight:500}

/* Question card */
.question-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:16px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;animation:cardRise 0.4s var(--ease-bounce) both}
@keyframes cardRise{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent-red),var(--accent-gold),var(--accent-jade))}

.q-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem}
.q-number{font-family:var(--font-serif);font-size:0.8rem;font-weight:700;color:var(--accent-red);border:2px solid var(--accent-red);width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;transform:rotate(-3deg);flex-shrink:0}
.q-dim-tag{font-size:0.75rem;color:var(--accent-jade);background:var(--accent-jade-dim);padding:3px 10px;border-radius:12px;font-weight:500}
.q-text{font-family:var(--font-serif);font-size:clamp(1rem,3vw,1.2rem);line-height:1.8;color:var(--text-primary)}

/* Options */
.options{display:flex;flex-direction:column;gap:0.6rem}
.option-btn{display:flex;align-items:center;gap:1rem;background:var(--bg-secondary);border:1.5px solid var(--border-subtle);border-radius:12px;padding:1rem 1.2rem;cursor:pointer;transition:all 0.25s var(--ease-out);position:relative;overflow:hidden;text-align:left;width:100%;font-family:var(--font-sans);font-size:0.95rem;color:var(--text-primary)}
.option-btn:hover{border-color:var(--accent-gold);background:var(--bg-card);transform:translateX(4px)}
.option-btn.selected{border-color:var(--accent-red);background:var(--accent-red-soft);box-shadow:0 0 15px var(--accent-red-glow)}
.opt-score{font-family:var(--font-serif);font-weight:700;color:var(--accent-gold);width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--accent-gold-dim);border-radius:8px;flex-shrink:0;font-size:0.85rem}
.option-btn.selected .opt-score{background:var(--accent-red);color:white}
.opt-label{flex:1}
.opt-emoji{font-size:1.1rem;margin-left:auto;opacity:0.6;transition:opacity 0.2s}
.option-btn:hover .opt-emoji,.option-btn.selected .opt-emoji{opacity:1}

/* Ripple */
.ripple{position:absolute;border-radius:50%;background:var(--accent-red-glow);transform:scale(0);animation:rippleAnim 0.6s ease-out;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* Navigation */
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;gap:1rem}
.btn-nav{font-family:var(--font-serif);font-size:0.95rem;padding:0.8rem 1.8rem;border-radius:10px;cursor:pointer;transition:all 0.3s var(--ease-out);font-weight:600;letter-spacing:0.05em}
.btn-prev{background:var(--bg-card);border:1.5px solid var(--border-subtle);color:var(--text-secondary)}
.btn-prev:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.btn-next{background:linear-gradient(135deg,var(--accent-red),#a02820);border:none;color:white}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 4px 15px var(--accent-red-glow)}
.btn-next:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== RESULT PAGE ===== */
.result{max-width:800px;width:100%;margin:0 auto;padding-top:1rem}

/* Reveal sequence */
.reveal-container{text-align:center;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:2rem}
.reveal-star,.reveal-nickname,.reveal-name{font-family:var(--font-brush);opacity:0;transform:scale(0.6);transition:all 0.8s var(--ease-bounce)}
.reveal-star.visible,.reveal-nickname.visible,.reveal-name.visible{opacity:1;transform:scale(1)}
.reveal-star{font-size:clamp(0.9rem,2.5vw,1.1rem);color:var(--accent-gold);letter-spacing:0.3em;margin-bottom:0.8rem}
.reveal-nickname{font-size:clamp(1.5rem,4vw,2.2rem);color:var(--accent-red);font-weight:700;letter-spacing:0.2em;margin-bottom:0.5rem}
.reveal-name{font-size:clamp(2.5rem,7vw,4.5rem);font-weight:900;background:linear-gradient(135deg,var(--text-primary),var(--accent-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.15em;margin-bottom:1rem}

/* Stamp */
.stamp-container{position:relative;display:inline-block;margin-bottom:1.5rem}
.stamp{font-family:var(--font-serif);font-size:1.5rem;font-weight:900;color:var(--accent-red);border:3px solid var(--accent-red);padding:0.5rem 1.2rem;transform:rotate(-8deg);opacity:0;transition:opacity 0.4s,transform 0.4s var(--ease-bounce);position:relative;letter-spacing:0.2em}
.stamp.visible{opacity:0.85;transform:rotate(-8deg) scale(1)}
.stamp::before{content:'';position:absolute;inset:-2px;border:1px solid var(--accent-red);opacity:0.3}
.stamp::after{content:'';position:absolute;inset:2px;border:1px dashed var(--accent-red);opacity:0.2}

.reveal-sketch{max-width:560px;font-size:0.9rem;color:var(--text-secondary);line-height:1.9;opacity:0;transition:opacity 1s ease;text-align:left;margin:0 auto;padding:0 1rem}
.reveal-sketch.visible{opacity:1}

/* Section titles */
.section-title{font-family:var(--font-serif);font-size:1.15rem;font-weight:700;color:var(--accent-gold);letter-spacing:0.1em;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.section-title::before{content:'◆';font-size:0.6rem;color:var(--accent-red)}

/* Ink divider */
.ink-divider{height:1px;background:linear-gradient(90deg,transparent,var(--accent-gold-dim),var(--accent-red-soft),var(--accent-gold-dim),transparent);margin:2rem 0;position:relative}
.ink-divider::after{content:'※';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-deep);padding:0 1rem;color:var(--accent-gold);font-size:0.8rem}

/* Radar chart */
.radar-section{margin:2rem 0;text-align:center}
#radar-canvas{max-width:420px;max-height:420px;width:100%;aspect-ratio:1}

/* Dimension cards */
.dimension-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin:1.5rem 0}
.dim-card{background:var(--bg-card);border-radius:12px;padding:1.2rem;border:1px solid var(--border-subtle);transition:transform 0.2s}
.dim-card:hover{transform:translateY(-2px)}
.dim-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem}
.dim-name{font-family:var(--font-serif);font-size:1rem;font-weight:600;display:flex;align-items:center;gap:0.4rem}
.dim-icon{font-size:1.1rem}
.dim-scores{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.6rem}
.dim-score-item{display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;color:var(--text-secondary)}
.dot{width:8px;height:8px;border-radius:50%}
.dot-user{background:var(--accent-red)}
.dot-char{background:var(--accent-gold)}
.dim-bar-track{width:100%;height:6px;background:rgba(107,93,79,0.2);border-radius:3px;margin-bottom:0.8rem;position:relative;overflow:hidden}
.dim-bar-user,.dim-bar-char{position:absolute;top:0;left:0;height:100%;border-radius:3px;transition:width 0.8s var(--ease-out)}
.dim-bar-user{background:linear-gradient(90deg,var(--accent-red),#e05545);z-index:2}
.dim-bar-char{background:linear-gradient(90deg,var(--accent-gold),#e8c060);z-index:1;opacity:0.5}
.dim-interpretation{font-size:0.82rem;color:var(--text-secondary);line-height:1.7}

/* Report sections */
.report-section{background:var(--bg-card);border-radius:12px;padding:1.5rem;margin-bottom:1rem;border:1px solid var(--border-subtle)}
.report-text{font-size:0.9rem;color:var(--text-secondary);line-height:1.9}

/* Sub matches */
.sub-matches{display:flex;flex-direction:column;gap:0.8rem}
.sub-match-item{display:flex;align-items:center;gap:1rem;background:var(--bg-card);border-radius:12px;padding:1rem 1.2rem;border:1px solid var(--border-subtle)}
.sub-match-rank{font-family:var(--font-serif);font-size:0.75rem;color:var(--accent-gold);background:var(--accent-gold-dim);padding:4px 10px;border-radius:8px;white-space:nowrap;font-weight:600}
.sub-match-info{flex:1}
.sub-match-name{font-family:var(--font-serif);font-weight:700;font-size:1rem}
.sub-match-detail{font-size:0.8rem;color:var(--text-secondary)}
.sub-match-dist{font-size:0.8rem;color:var(--text-muted);font-family:var(--font-serif)}

/* Result actions */
.result-actions{display:flex;gap:1rem;justify-content:center;margin-top:2rem;flex-wrap:wrap}
.btn-primary{font-family:var(--font-serif);font-size:1rem;font-weight:700;color:white;background:linear-gradient(135deg,var(--accent-red),#a02820);border:none;padding:0.9rem 2.2rem;border-radius:12px;cursor:pointer;transition:all 0.3s;letter-spacing:0.05em}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-red-glow)}
.btn-secondary{font-family:var(--font-serif);font-size:1rem;font-weight:600;color:var(--text-secondary);background:var(--bg-card);border:1.5px solid var(--border-subtle);padding:0.9rem 2.2rem;border-radius:12px;cursor:pointer;transition:all 0.3s;letter-spacing:0.05em}
.btn-secondary:hover{border-color:var(--accent-gold);color:var(--accent-gold)}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);color:var(--text-primary);padding:0.8rem 1.5rem;border-radius:12px;border:1px solid var(--accent-gold);font-size:0.9rem;z-index:100;transition:transform 0.4s var(--ease-bounce);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .page{padding:1.5rem 1rem}
  .version-selector{flex-direction:column;align-items:center}
  .version-card{width:100%;max-width:260px}
  .dimension-grid{grid-template-columns:1fr}
  .quiz-nav{flex-direction:column}
  .btn-nav{width:100%;text-align:center}
  .result-actions{flex-direction:column;align-items:center}
  .btn-primary,.btn-secondary{width:100%;max-width:280px;text-align:center}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">

<!-- ============ WELCOME PAGE ============ -->
<section class="page welcome active" id="page-welcome">
  <div class="welcome-ornament">⚔️</div>
  <h1 class="welcome-title">水浒人物性格测评</h1>
  <p class="welcome-sub">测测你是梁山哪位好汉？</p>
  <p class="welcome-desc">
    从侠义心肠到乐观洒脱，八个维度描绘你的江湖人格。<br>
    完成测评，匹配与你性格最接近的梁山好汉。
  </p>

  <div class="version-selector">
    <div class="version-card" data-version="24" onclick="selectVersion(24)">
      <span class="version-badge">快速</span>
      <div class="version-icon">📜</div>
      <div class="version-name">精简版</div>
      <div class="version-info">24 道题 · 约 3 分钟</div>
    </div>
    <div class="version-card" data-version="96" onclick="selectVersion(96)">
      <span class="version-badge">全面</span>
      <div class="version-icon">📖</div>
      <div class="version-name">完整版</div>
      <div class="version-info">96 道题 · 约 10 分钟</div>
    </div>
  </div>

  <button class="btn-start" id="btn-start" disabled onclick="startQuiz()">开始测评</button>
  <p class="welcome-footer">基于《水浒传》一百单八将性格特质设计 · 八维度测评体系</p>
</section>

<!-- ============ QUIZ PAGE ============ -->
<section class="page quiz" id="page-quiz">
  <div class="progress-bar">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-info">
      <span class="progress-text" id="progress-text">第 1 题</span>
      <span class="progress-dim" id="progress-dim"></span>
    </div>
  </div>
  <div id="question-area"></div>
  <div class="quiz-nav">
    <button class="btn-nav btn-prev" id="btn-prev" onclick="prevQuestion()">上一题</button>
    <button class="btn-nav btn-next" id="btn-next" onclick="nextQuestion()">下一题</button>
  </div>
</section>

<!-- ============ RESULT PAGE ============ -->
<section class="page result" id="page-result">
  <div class="reveal-container">
    <div class="reveal-star" id="reveal-star"></div>
    <div class="reveal-nickname" id="reveal-nickname"></div>
    <div class="reveal-name" id="reveal-name"></div>
    <div class="stamp-container">
      <div class="stamp" id="reveal-stamp"></div>
    </div>
    <p class="reveal-sketch" id="reveal-sketch"></p>
  </div>
  <div class="ink-divider"></div>
  <div class="radar-section">
    <h2 class="section-title">八维性格雷达图</h2>
    <canvas id="radar-canvas" width="800" height="800"></canvas>
  </div>
  <div class="ink-divider"></div>
  <h2 class="section-title">八维性格光谱详解</h2>
  <div class="dimension-grid" id="dimension-grid"></div>
  <div class="ink-divider"></div>
  <div id="report-sections"></div>
  <div class="ink-divider"></div>
  <h2 class="section-title">次匹配人物</h2>
  <div class="sub-matches" id="sub-matches"></div>
  <div class="result-actions">
    <button class="btn-primary" onclick="restartQuiz()">重新测评</button>

   spec:"豪放（极高，5分）：秦明是梁山最火爆的好汉。\n忠义（高，4分）：归顺后忠心耿耿。\n领导（中，3分）：统兵有方，但脾气火爆。\n叛逆（中，2分）：投降梁山算是最大的叛逆。\n侠义（中，2分）：有武人的豪气。\n沉稳（极低，1分）：一点就着，冲动是致命伤。\n孤傲（中，2分）：人来疯的性格。\n乐观（中，2分）：急性子的人通常不记仇。",
   traits:"核心特质一：纯粹的战斗本能。\n核心特质二：简单人的悲剧。",
   allegory:"秦明是一团烈火：照亮了战场，也烧毁了自己。",
   modern:"若生于当代，最适合做销售冠军或体育竞技者。"},
  {rank:8,star:"天威星",nick:"双鞭",name:"呼延灼",s:[2,4,2,1,5,3,2,2],
   sketch:"天威星，河东名将呼延赞之后。双鞭绝技名震天下，原为汝宁郡都统制，最终兵败归降。",

  {rank:9,star:"天英星",nick:"小李广",name:"花荣",s:[3,4,2,1,5,2,3,1],
   sketch:"天英星，梁山第一神箭手。清风寨知寨出身，相貌俊美、箭术无双。最终在宋江墓前自缢殉义。",
   spec:"忠义（极高，5分）：花荣对宋江的忠义，是水浒中最纯粹的感情。\n沉稳（高，4分）：弓箭手的天性——冷静、专注。\n孤傲（中，3分）：俊美的外表和高超的技艺带来距离感。\n侠义（中，3分）：有侠义心肠。\n豪放（中，2分）：外表清秀，内心有武人的豪情。\n领导（中，2分）：更愿意做辅佐者。\n叛逆（低，1分）：叛逆的唯一原因是为了宋江。\n乐观（极低，1分）：殉义之人，骨子里是悲观的。",
   traits:"核心特质一：殉道式的忠义。\n核心特质二：完美主义者。",
   allegory:"花荣是水浒中最纯粹的存在：宋江在哪，他就在哪。",
   modern:"若生于当代，最适合做艺术总监或专业运动员。"},
  {rank:10,star:"天贵星",nick:"小旋风",name:"柴进",s:[4,3,2,2,3,3,2,3],

  {rank:11,star:"天富星",nick:"扑天雕",name:"李应",s:[2,4,2,1,3,4,4,3],
   sketch:"天富星，独龙岗李家庄庄主。善使飞刀，文武双全。上山后掌管钱粮，是梁山的财务大管家。",
   spec:"领导（高，4分）：管理有方。\n沉稳（高，4分）：商人本色，不冲动。\n孤傲（高，4分）：不太合群，更喜欢埋头做事。\n忠义（中，3分）：忠诚但不狂热。\n豪放（中，2分）：精打细算。\n侠义（中，2分）：有限的侠义。\n叛逆（低，1分）：最不想上梁山。\n乐观（中，3分）：务实者的乐观。",

   allegory:"李应是水浒中最"现代"的人物——梁山的CFO。",

  {rank:13,star:"天孤星",nick:"花和尚",name:"鲁智深",s:[5,2,5,4,4,3,2,5],
   sketch:"天孤星，原名鲁达。三拳打死镇关西，倒拔垂杨柳，大闹野猪林。他是水浒中最纯粹的侠客。",
   spec:"侠义（极高，5分）：鲁智深的侠义是本能。看到不公就出手。\n豪放（极高，5分）：大口吃肉、大碗喝酒、大声骂人。\n乐观（极高，5分）：无论什么境遇都能坦然面对。\n叛逆（高，4分）：他反的是不公。\n忠义（高，4分）：对兄弟的情义真挚纯粹。\n领导（中，3分）：有天然感召力，但不想领导任何人。\n沉稳（低，2分）：冲动是天性。\n孤傲（低，2分）：人缘极好。",
   traits:"核心特质一：赤子之心。\n核心特质二：破戒即持戒——破的是形式，持的是真心。",
   allegory:"鲁智深是《水浒传》留给世人最大的惊喜：佛不在庙里，在心里。",
   modern:"若生于当代，最适合做公益组织创始人或极限运动爱好者。"},
  {rank:14,star:"天伤星",nick:"行者",name:"武松",s:[4,3,4,4,4,3,5,2],
   sketch:"天伤星，绰号"行者"。景阳冈打虎、血溅鸳鸯楼——他是水浒中最能打的人，也是最孤独的人。",
   spec:"孤傲（极高，5分）：武松是梁山最孤独的人。\n侠义（高，4分）：路见不平必出手，带着冰冷的理性。\n豪放（高，4分）：喝酒打虎的豪迈。\n叛逆（高，4分）：对体制有深刻的不信任。\n忠义（高，4分）：对兄弟情义深厚。\n领导（中，3分）：有能力，但无意领导。\n沉稳（中，3分）：能忍时极度隐忍。\n乐观（低，2分）：经历了太多背叛和伤害。",

  {rank:15,star:"天立星",nick:"双枪将",name:"董平",s:[2,2,4,3,3,3,3,3],

  {rank:16,star:"天捷星",nick:"没羽箭",name:"张清",s:[2,3,3,2,4,2,3,3],

  {rank:22,star:"天杀星",nick:"黑旋风",name:"李逵",s:[3,1,5,5,5,1,1,4],

/* ==============================================================
   INTERACTIVE BACKGROUND — Ink Wash Mountains
   ============================================================== */
function initBackground() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, mouseX = 0.5, mouseY = 0.5;
  let particles = [];
  let time = 0;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX / W;
    mouseY = e.clientY / H;
  });

  // Mountain layers (procedural)
  function generateMountain(baseY, amplitude, segments, roughness) {
    const points = [];
    const segW = W / segments;
    for (let i = 0; i <= segments; i++) {
      const x = i * segW;
      const noise = Math.sin(i * roughness) * amplitude * 0.6
                  + Math.sin(i * roughness * 2.3 + 1) * amplitude * 0.25
                  + Math.sin(i * roughness * 4.7 + 2) * amplitude * 0.15;
      points.push({ x, y: baseY + noise });
    }
    return points;
  }

  function drawMountain(points, color, parallaxFactor) {
    const offsetX = (mouseX - 0.5) * parallaxFactor;
    ctx.beginPath();
    ctx.moveTo(points[0].x + offsetX, points[0].y);
    for (let i = 1; i < points.length; i++) {
      const xc = (points[i-1].x + points[i].x) / 2 + offsetX;
      const yc = (points[i-1].y + points[i].y) / 2;
      ctx.quadraticCurveTo(points[i-1].x + offsetX, points[i-1].y, xc, yc);
    }
    ctx.lineTo(W + 50, H + 50);
    ctx.lineTo(-50, H + 50);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  // Particles (ink drops + fireflies)
  class Particle {
    constructor(type) {
      this.type = type; // 'ink' or 'firefly'
      this.reset();
    }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      if (this.type === 'ink') {
        this.size = Math.random() * 2 + 0.5;
        this.speedY = Math.random() * 0.3 + 0.05;
        this.speedX = (Math.random() - 0.5) * 0.1;
        this.opacity = Math.random() * 0.08 + 0.02;
        this.life = Math.random() * 800 + 300;
      } else {
        this.size = Math.random() * 2.5 + 1;
        this.speedY = (Math.random() - 0.5) * 0.2;
        this.speedX = (Math.random() - 0.5) * 0.2;
        this.opacity = 0;
        this.maxOpacity = Math.random() * 0.3 + 0.1;
        this.life = Math.random() * 400 + 200;
        this.phase = Math.random() * Math.PI * 2;
      }
      this.maxLife = this.life;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.life--;
      if (this.type === 'firefly') {
        this.opacity = this.maxOpacity * Math.sin((1 - this.life / this.maxLife) * Math.PI) * (0.5 + 0.5 * Math.sin(time * 0.02 + this.phase));
        this.x += Math.sin(time * 0.01 + this.phase) * 0.3;
      }
      if (this.life <= 0 || this.y > H || this.x < -10 || this.x > W + 10) this.reset();
    }
    draw() {
      if (this.type === 'ink') {
        const fadeIn = Math.min(1, (this.maxLife - this.life) / 60);
        const fadeOut = Math.min(1, this.life / 60);
        ctx.globalAlpha = this.opacity * fadeIn * fadeOut;
        ctx.fillStyle = '#6b5d4f';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.globalAlpha = this.opacity;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
        grad.addColorStop(0, 'rgba(212,168,75,0.6)');
        grad.addColorStop(0.5, 'rgba(212,168,75,0.2)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  for (let i = 0; i < 30; i++) particles.push(new Particle('ink'));
  for (let i = 0; i < 12; i++) particles.push(new Particle('firefly'));

  // Pre-generate mountains
  let mountains = [];
  function generateAll() {
    mountains = [
      { pts: generateMountain(H * 0.45, 80, 12, 0.8), color: 'rgba(18,14,10,0.9)', parallax: 15 },
      { pts: generateMountain(H * 0.55, 60, 15, 1.2), color: 'rgba(25,20,15,0.85)', parallax: 25 },
      { pts: generateMountain(H * 0.65, 50, 18, 1.8), color: 'rgba(32,26,18,0.8)', parallax: 35 },
      { pts: generateMountain(H * 0.75, 35, 22, 2.5), color: 'rgba(40,32,22,0.7)', parallax: 45 },
    ];
  }
  generateAll();
  window.addEventListener('resize', () => { resize(); generateAll(); });

  function drawMist() {
    const mistY = H * 0.5 + Math.sin(time * 0.005) * 20;
    const grad = ctx.createLinearGradient(0, mistY - 60, 0, mistY + 60);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.3, 'rgba(168,152,128,0.04)');
    grad.addColorStop(0.5, 'rgba(168,152,128,0.06)');
    grad.addColorStop(0.7, 'rgba(168,152,128,0.04)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, mistY - 60, W, 120);
  }

  function drawMoon() {
    const mx = W * 0.78 + (mouseX - 0.5) * -10;
    const my = H * 0.15 + (mouseY - 0.5) * -5;
    const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 80);
    grad.addColorStop(0, 'rgba(232,220,200,0.15)');
    grad.addColorStop(0.3, 'rgba(212,168,75,0.06)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mx, my, 80, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(232,220,200,0.2)';
    ctx.beginPath();
    ctx.arc(mx, my, 20, 0, Math.PI * 2);
    ctx.fill();
  }

  function animate() {
    time++;
    ctx.clearRect(0, 0, W, H);

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0d0a07');
    skyGrad.addColorStop(0.3, '#151008');
    skyGrad.addColorStop(0.6, '#1a1410');
    skyGrad.addColorStop(1, '#1a1410');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    drawMoon();

    // Mountains with parallax
    mountains.forEach(m => drawMountain(m.pts, m.color, m.parallax));

    drawMist();

    // Particles
    particles.forEach(p => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;

    requestAnimationFrame(animate);
  }
  animate();
}

/* ==============================================================

   ============================================================== */
function selectVersion(v) {
  selectedVersion = v;
  document.querySelectorAll('.version-card').forEach(c => {
    c.classList.toggle('selected', parseInt(c.dataset.version) === v);
  });
  document.getElementById('btn-start').disabled = false;
}

/* ==============================================================
   QUIZ LOGIC
   ============================================================== */
function startQuiz() {
  if (!selectedVersion) return;
  if (selectedVersion === 24) {
    currentQuestions = ALL_QUESTIONS.filter(q => SHORT_IDS.includes(q.id));
  } else {
    currentQuestions = [...ALL_QUESTIONS];
  }
  answers = new Array(currentQuestions.length).fill(null);
  currentQ = 0;
  showPage('page-quiz');
  renderQuestion(0);
}

function renderQuestion(idx) {
  const q = currentQuestions[idx];
  const labels = ['非常不同意','比较不同意','一般','比较同意','非常同意'];
  const emojis = ['😤','😕','😐','🙂','😄'];
  const area = document.getElementById('question-area');

  area.innerHTML = `
    <div class="question-card">
      <div class="q-header">
        <div class="q-number">${idx + 1}</div>
        <span class="q-dim-tag">${DIM_ICONS[q.dim]} ${q.dim}</span>
      </div>
      <p class="q-text">${q.text}</p>
    </div>
    <div class="options">
      ${labels.map((label, i) => {
        const val = i + 1;
        const sel = answers[idx] === val ? 'selected' : '';
        return `<button class="option-btn ${sel}" data-value="${val}" onclick="selectOption(${idx},${val},this)">
          <span class="opt-score">${val}</span>
          <span class="opt-label">${label}</span>
          <span class="opt-emoji">${emojis[i]}</span>
        </button>`;
      }).join('')}
    </div>
  `;

  updateProgress();
  updateNav();
}

function selectOption(qIdx, val, btn) {
  answers[qIdx] = val;
  btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  // Ripple
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.left = '50%';
  ripple.style.top = '50%';
  ripple.style.width = ripple.style.height = '10px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
  // Auto-advance
  setTimeout(() => {
    if (currentQ < currentQuestions.length - 1) {
      currentQ++;
      renderQuestion(currentQ);
    }
  }, 350);
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(currentQ); }
}

function nextQuestion() {
  if (answers[currentQ] === null) { showToast('请先选择一个选项'); return; }
  if (currentQ < currentQuestions.length - 1) {
    currentQ++;
    renderQuestion(currentQ);
  } else {
    if (answers.some(a => a === null)) {
      const first = answers.findIndex(a => a === null);
      showToast(`第 ${first + 1} 题还未作答`);
      currentQ = first;
      renderQuestion(currentQ);
      return;
    }
    showResult();
  }
}

function updateProgress() {
  const total = currentQuestions.length;
  const pct = ((currentQ + 1) / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `第 ${currentQ + 1} 题 / 共 ${total} 题`;
  document.getElementById('progress-dim').textContent = `${DIM_ICONS[currentQuestions[currentQ].dim]} ${currentQuestions[currentQ].dim}`;
}

function updateNav() {
  document.getElementById('btn-prev').style.visibility = currentQ > 0 ? 'visible' : 'hidden';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentQ === currentQuestions.length - 1 ? '查看结果' : '下一题';
}

/* ==============================================================
   SCORING & MATCHING
   ============================================================== */
function calcScores() {
  const scores = {};
  DIMS.forEach(dim => {
    const items = [];
    currentQuestions.forEach((q, i) => {
      if (q.dim === dim && answers[i] !== null) {
        items.push(q.r ? (6 - answers[i]) : answers[i]);
      }
    });
    scores[dim] = items.length ? items.reduce((a, b) => a + b, 0) / items.length : 0;
  });
  return scores;
}

function matchChar(userScores) {
  const uv = DIMS.map(d => userScores[d] || 0);
  const results = CHARACTERS.map(c => {
    const dist = Math.sqrt(uv.reduce((s, v, i) => s + (v - c.s[i]) ** 2, 0));
    return { ...c, dist };
  });
  results.sort((a, b) => a.dist - b.dist);
  return results;
}

/* ==============================================================
   RADAR CHART
   ============================================================== */
function drawRadar(userScores, charScores, anim) {
  const canvas = document.getElementById('radar-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) * 0.35;
  const steps = 5, n = 8;
  const angleStep = (2 * Math.PI) / n;
  const startAngle = -Math.PI / 2;

  ctx.clearRect(0, 0, W, H);

  // Grid
  for (let s = 1; s <= steps; s++) {
    const r = (R / steps) * s;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = startAngle + angleStep * (i % n);
      const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(168,152,128,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axes
  for (let i = 0; i < n; i++) {
    const a = startAngle + angleStep * i;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
    ctx.strokeStyle = 'rgba(168,152,128,0.08)';
    ctx.stroke();
  }

  // Labels
  ctx.font = '24px "Noto Serif SC", serif';
  ctx.fillStyle = '#a89880';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const labelR = R + 40;
  DIMS.forEach((dim, i) => {
    const a = startAngle + angleStep * i;
    ctx.fillText(dim, cx + labelR * Math.cos(a), cy + labelR * Math.sin(a));
  });

  function drawPoly(scores, stroke, fill, prog) {
    const pts = DIMS.map((dim, i) => {
      const a = startAngle + angleStep * i;
      const v = Math.min(5, Math.max(0, scores[dim] || 0));
      const r = (v / 5) * R * prog;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    });
    if (fill) {
      ctx.beginPath();
      pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
    }
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 3;
    ctx.stroke();
    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = stroke;
      ctx.fill();
    });
  }

  drawPoly(userScores, '#c23a2b', 'rgba(194,58,43,0.2)', anim);
  drawPoly(charScores, '#d4a84b', null, anim);

  if (anim >= 1) {
    ctx.font = '20px "Noto Sans SC", sans-serif';
    DIMS.forEach((dim, i) => {
      const a = startAngle + angleStep * i;
      const v = userScores[dim] || 0;
      const r = (v / 5) * R;
      ctx.fillStyle = '#e8dcc8';
      ctx.textAlign = 'center';
      ctx.fillText(v.toFixed(1), cx + (r + 20) * Math.cos(a), cy + (r + 20) * Math.sin(a));
    });
  }
}

function animateRadar(us, cs) {
  let start = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - start) / 1500);
    const ease = 1 - (1 - p) ** 3;
    drawRadar(us, cs, ease);
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ==============================================================
   RESULT RENDERING
   ============================================================== */
function showResult() {
  const userScores = calcScores();
  matchResults = matchChar(userScores);
  const best = matchResults[0];
  const cs = {};
  DIMS.forEach((d, i) => { cs[d] = best.s[i]; });

  showPage('page-result');

  // Reveal animation
  const els = {
    star: document.getElementById('reveal-star'),
    nick: document.getElementById('reveal-nickname'),
    name: document.getElementById('reveal-name'),
    stamp: document.getElementById('reveal-stamp'),
    sketch: document.getElementById('reveal-sketch')
  };
  Object.values(els).forEach(el => { el.classList.remove('visible'); el.style.transitionDelay = '0s'; });

  els.star.textContent = best.star;
  els.nick.textContent = best.nick;
  els.name.textContent = best.name;
  els.stamp.textContent = best.name;
  els.sketch.textContent = best.sketch;

  setTimeout(() => els.star.classList.add('visible'), 300);
  setTimeout(() => els.nick.classList.add('visible'), 900);
  setTimeout(() => els.name.classList.add('visible'), 1500);
  setTimeout(() => els.stamp.classList.add('visible'), 2100);
  setTimeout(() => els.sketch.classList.add('visible'), 2600);

  // Radar
  setTimeout(() => animateRadar(userScores, cs), 2800);

  // Dimension cards
  setTimeout(() => renderDimCards(userScores, cs, best), 3000);

  // Report
  setTimeout(() => renderReport(best), 3200);

  // Sub matches
  setTimeout(() => renderSubMatches(), 3400);
}

function renderDimCards(us, cs, char) {
  const grid = document.getElementById('dimension-grid');
  grid.innerHTML = DIMS.map(dim => {
    const uv = us[dim] || 0, cv = cs[dim] || 0;
    const lvl = uv >= 4 ? 'high' : uv >= 2 ? 'mid' : 'low';
    return `<div class="dim-card">
      <div class="dim-card-header"><span class="dim-name"><span class="dim-icon">${DIM_ICONS[dim]}</span> ${dim}</span></div>
      <div class="dim-scores">
        <span class="dim-score-item"><span class="dot dot-user"></span> 我：${uv.toFixed(1)}</span>
        <span class="dim-score-item"><span class="dot dot-char"></span> ${char.name}：${cv.toFixed(1)}</span>
      </div>
      <div class="dim-bar-track">
        <div class="dim-bar-user" style="width:0%"></div>
        <div class="dim-bar-char" style="width:0%"></div>
      </div>
      <p class="dim-interpretation">${DIM_INTERP[dim][lvl]}</p>
    </div>`;
  }).join('');

  requestAnimationFrame(() => {
    grid.querySelectorAll('.dim-card').forEach((card, i) => {
      const dim = DIMS[i];
      setTimeout(() => {
        card.querySelector('.dim-bar-user').style.width = ((us[dim] || 0) / 5 * 100) + '%';
        card.querySelector('.dim-bar-char').style.width = ((cs[dim] || 0) / 5 * 100) + '%';
      }, i * 80);
    });
  });
}

function renderReport(char) {
  document.getElementById('report-sections').innerHTML = `
    <div class="report-section"><h2 class="section-title">精神特质与行为密码</h2><div class="report-text">${char.traits.replace(/\n/g,'<br>')}</div></div>
    <div class="report-section"><h2 class="section-title">水浒人生寓言</h2><div class="report-text">${char.allegory}</div></div>
    <div class="report-section"><h2 class="section-title">现代映照</h2><div class="report-text">${char.modern}</div></div>
    <div class="report-section"><h2 class="section-title">八维性格光谱</h2><div class="report-text">${char.spec.replace(/\n/g,'<br>')}</div></div>
  `;
}

function renderSubMatches() {
  const c = document.getElementById('sub-matches');
  if (!matchResults || matchResults.length < 3) { c.innerHTML = '<p style="color:var(--text-muted)">数据不足</p>'; return; }
  c.innerHTML = [matchResults[1], matchResults[2]].map((m, i) => `
    <div class="sub-match-item">
      <span class="sub-match-rank">第 ${i + 2} 匹配</span>
      <div class="sub-match-info"><span class="sub-match-name">${m.name}</span><span class="sub-match-detail"> · ${m.star} · ${m.nick}</span></div>
      <span class="sub-match-dist">距离 ${m.dist.toFixed(2)}</span>
    </div>
  `).join('');
}

/* ==============================================================
   SHARE & NAVIGATION
   ============================================================== */
function shareResult() {
  if (!matchResults) return;
  const best = matchResults[0];
  const us = calcScores();
  const dimSum = DIMS.map(d => `${d}:${(us[d]||0).toFixed(1)}`).join(' | ');
  const text = [
    '🏯 水浒人物性格测评结果',
    '━━━━━━━━━━━━━━━━━━',
    `我是 ${best.star} · ${best.nick} · ${best.name}！`,
    '', `📊 我的八维：${dimSum}`, '',
    `🥈 第二匹配：${matchResults[1].name}（${matchResults[1].nick}）`,
    `🥉 第三匹配：${matchResults[2].name}（${matchResults[2].nick}）`,
    '', '━━━━━━━━━━━━━━━━━━',
    '来测测你是梁山哪位好汉？'
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('结果已复制到剪贴板！')).catch(() => showToast('复制失败'));
}

function restartQuiz() {
  selectedVersion = null;
  currentQuestions = [];
  answers = [];
  matchResults = null;
  document.querySelectorAll('.version-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('btn-start').disabled = true;
  showPage('page-welcome');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(id);
  page.classList.add('active');
  page.style.animation = 'none';
  page.offsetHeight;
  page.style.animation = '';
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ==============================================================
   INIT
   ============================================================== */
initBackground();
</script>
